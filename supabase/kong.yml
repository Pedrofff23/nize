_format_version: "1.1"
_transform: true

services:
  - name: auth
    url: http://auth:9999
    routes:
      - name: auth-route
        paths:
          - /auth/v1

  - name: rest
    url: http://rest:3000
    routes:
      - name: rest-route
        paths:
          - /rest/v1

  - name: studio
    url: http://studio:3000
    routes:
      - name: studio-route
        paths:
          - /

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - DNT
        - Keep-Alive
        - User-Agent
        - X-Requested-With
        - If-Modified-Since
        - Cache-Control
        - Content-Type
        - Range
        - Authorization
        - x-client-info
        - apikey
        - x-customer-token
      exposed_headers:
        - Content-Length
        - Content-Range
      max_age: 3600
      credentials: true
